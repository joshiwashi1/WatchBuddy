<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WatchBuddy API Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-4">

  <div class="container">
    <h1 class="mb-4">WatchBuddy API Test</h1>

    <button id="btnRegister" class="btn btn-success me-2">Register</button>
    <button id="btnMe" class="btn btn-info me-2">Check Session</button>
    <button id="btnLogout" class="btn btn-danger">Logout</button>

    <hr class="my-4">

    <h4>Output</h4>
    <pre id="output" class="p-3 bg-black text-success rounded" style="max-height:400px;overflow:auto;"></pre>
  </div>

  <script>
    const API = 'http://localhost/watchbuddy/backend/public';
    const output = document.getElementById('output');

    function log(msg, type="success") {
      output.innerHTML += `<div class="text-${type}">${JSON.stringify(msg, null, 2)}</div>\n`;
    }

    // Register
    document.getElementById('btnRegister').onclick = () => {
      fetch(`${API}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          firstName:'Ell',
          middleName:'',
          lastName:'Termizi',
          suffix:'',
          email:'ell@example.com',
          password:'secret123'
        })
      })
      .then(r => r.json())
      .then(d => log(d, "success"))
      .catch(e => log(e, "danger"));
    };

    // Check session
    document.getElementById('btnMe').onclick = () => {
      fetch(`${API}/api/me`, { credentials: 'include' })
        .then(r => r.json())
        .then(d => log(d, "info"))
        .catch(e => log(e, "danger"));
    };

    // Logout
    document.getElementById('btnLogout').onclick = () => {
      fetch(`${API}/api/logout`, {
        method: 'POST',
        credentials: 'include'
      })
      .then(r => r.json())
      .then(d => log(d, "danger"))
      .catch(e => log(e, "danger"));
    };
  </script>

</body>
</html>
